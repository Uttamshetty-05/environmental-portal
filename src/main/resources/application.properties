# =====================================
# APPLICATION INFO
# =====================================
spring.application.name=environmental_portal_backend

# =====================================
# H2 FILE DATABASE (PRODUCTION)
# =====================================
spring.datasource.url=jdbc:h2:file:./data/envdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =====================================
# JPA
# =====================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# =====================================
# JWT
# =====================================
app.jwtSecret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
app.jwtExpirationMs=86400000

# =====================================
# SERVER
# =====================================
server.port=8080

spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.main.allow-bean-definition-overriding=true