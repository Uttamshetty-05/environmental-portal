<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Reset Password</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f0f4f8; 
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.reset-container {
  background: white;
  padding: 2rem 3rem;
  border-radius: 10px;
  width: 350px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  text-align: center;
}
input, button {
  width: 100%;
  padding: 0.6rem 0.8rem;
  margin-top: 0.75rem;
  font-size: 1rem;
  border-radius: 4px;
  border: 1px solid #ccc;
}
button {
  background-color: #27ae60;
  border: none;
  color: white;
  font-weight: 700;
  margin-top: 1.5rem;
  cursor: pointer;
}
.message {
  margin-top: 1rem;
  font-size: 0.9rem;
}
.message.success { color: #27ae60; }
.message.error { color: #e74c3c; }
</style>
</head>
<body>
<div class="reset-container">
  <h2>Reset Password</h2>
  <form id="resetForm">
    <input type="password" id="newPassword" placeholder="Enter new password" required />
    <button type="submit">Reset</button>
  </form>
  <p id="message" class="message"></p>
</div>
<script>
const form = document.getElementById('resetForm');
const messageEl = document.getElementById('message');
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

form.addEventListener('submit', async e => {
  e.preventDefault();
  
  if (!token) {
    messageEl.textContent = 'Reset token missing.';
    messageEl.className = 'message error';
    return;
  }
  
  try {
    const response = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token, newPassword: form.newPassword.value})
    });
    
    if (response.ok) {
      messageEl.textContent = 'Password reset successful! Redirecting to login...';
      messageEl.className = 'message success';
      setTimeout(() => window.location.href = '/login.html', 3000);
    } else {
      const errText = await response.text();
      messageEl.textContent = 'Reset failed: ' + errText;
      messageEl.className = 'message error';
    }
  } catch (err) {
    messageEl.textContent = 'Error resetting password.';
    messageEl.className = 'message error';
  }
});
</script>
</body>
</html>
