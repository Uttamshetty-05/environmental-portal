<!DOCTYPE html>
<html>
<head>
<title>Environmental Policies</title>
<style>
body {
    margin:0;
    font-family:Segoe UI;
    background: linear-gradient(120deg,#a8e063,#56ab2f);
    color:white;
    text-align:center;
}

.container {
    margin-top:100px;
}

.policy-box {
    background:white;
    color:#2e7d32;
    width:600px;
    margin:20px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="container">
    <h1> Environmental Policies</h1>

    <div class="policy-box">
        <h3> Waste Management Policy</h3>
        <p>All industrial waste must be treated before disposal.</p>
    </div>

    <div class="policy-box">
        <h3> Water Conservation Policy</h3>
        <p>Water usage must be reduced by 30% annually.</p>
    </div>

    <div class="policy-box">
        <h3> Carbon Emission Control</h3>
        <p>Companies must comply with national emission limits.</p>
    </div>
</div>

</body>
</html>
