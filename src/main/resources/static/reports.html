<!DOCTYPE html>
<html>
<head>
<title>Environmental Reports</title>
<style>
body {
    margin:0;
    font-family:Segoe UI;
    background: linear-gradient(135deg,#43cea2,#185a9d);
    text-align:center;
    color:white;
}

.container {
    margin-top:80px;
}

.report-card {
    background:white;
    color:#185a9d;
    width:250px;
    display:inline-block;
    margin:20px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    transition:0.3s;
}

.report-card:hover {
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
    <h1> Environmental Reports</h1>

    <div class="report-card">
        <h3>Air Quality</h3>
        <p>PM2.5 Levels: Moderate</p>
    </div>

    <div class="report-card">
        <h3>Water Index</h3>
        <p>Quality: Good</p>
    </div>

    <div class="report-card">
        <h3>Carbon Data</h3>
        <p>Emission Reduced by 12%</p>
    </div>
</div>

</body>
</html>
